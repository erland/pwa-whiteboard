server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  # Convenience redirect if someone hits '/'
  location = / {
    return 302 /pwa-whiteboard/;
  }

  # Serve the app under /pwa-whiteboard/
  location /pwa-whiteboard/ {
    try_files $uri $uri/ /pwa-whiteboard/index.html;
  }

  # Cache static assets aggressively
  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
